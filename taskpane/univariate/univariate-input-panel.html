<style>
  .uni-panel { margin-top:16px; padding:14px; background:#fff8f0; border-radius:8px; border:1px solid #fed7aa; }
  .uni-title { font-weight:600; font-size:14px; margin-bottom:10px; color:#c2410c; display:flex; align-items:center; gap:8px; }
  .uni-summary { font-size:12px; color:#6b7280; margin-bottom:10px; }
  .uni-summary span { display:inline-block; margin-right:12px; }
  .uni-actions { display:flex; gap:8px; }
  .uni-btn { flex:1; padding:12px 14px; font-size:14px; font-weight:600; color:white; background:linear-gradient(135deg, #f97316 0%, #ea580c 100%); border:none; border-radius:8px; cursor:pointer; }
  .uni-btn:disabled { background:#cbd5e1; cursor:not-allowed; }
  .uni-btn-secondary { flex:0 0 auto; padding:12px 16px; font-size:13px; font-weight:500; color:#374151; background:white; border:1px solid #d1d5db; border-radius:8px; cursor:pointer; }
  .uni-btn-secondary:disabled { opacity:0.5; cursor:not-allowed; }
  .uni-note { margin-top:8px; font-size:12px; color:#c2410c; background:#fff8f0; border:1px solid #fed7aa; border-radius:6px; padding:8px 10px; }
</style>

<div id="uniPanel" class="uni-panel" style="display:none;">
  <div class="uni-title">
    <i class="fa-solid fa-chart-simple"></i>
    Univariate Setup
  </div>
  <div class="uni-summary">
    <span>Range: <strong id="uniRange">—</strong></span>
    <span>Rows: <strong id="uniRows">0</strong></span>
    <span>Columns: <strong id="uniCols">0</strong></span>
  </div>
  <div class="uni-actions">
    <button id="openUnivariateBuilder" class="uni-btn" onclick="openUnivariateBuilder()" disabled>
      <i class="fa-solid fa-up-right-from-square"></i> Open Configuration
    </button>
    <button id="resetUnivariateModelBtn" class="uni-btn-secondary" onclick="resetUnivariateModel()" style="display:none;">
      <i class="fa-solid fa-rotate-left"></i> Reset
    </button>
  </div>
  <div class="uni-note">Select range here, then pick column, trim, and transform in the popup.</div>
</div>
