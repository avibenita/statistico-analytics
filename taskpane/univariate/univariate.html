<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Univariate Analysis - Statistico Analytics</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../src/shared/css/taskpane-light.css">
  <link rel="stylesheet" href="../../src/shared/css/data-input-panel.css">
</head>
<body>
  <div class="taskpane-container">
    <div class="module-header">
      <div class="module-header-title">
        <i class="fa-solid fa-chart-simple"></i>
        Univariate
      </div>
      <button class="back-btn" onclick="goBack()">
        <i class="fa-solid fa-arrow-left"></i>
        Back
      </button>
    </div>

    <div class="taskpane-content">
      <div id="dataInputPanelContainer"></div>
      <div id="univariateInputPanelContainer"></div>
    </div>
  </div>

  <script src="../../src/shared/js/components/DataInputPanel.js"></script>
  <script src="univariate-input-panel.js"></script>

  <script>
    function goBack() { window.location.href = '../hub.html'; }

    Office.onReady((info) => {
      if (info.host !== Office.HostType.Excel) return;

      fetch('../../src/shared/components/data-input-panel.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('dataInputPanelContainer').innerHTML = html;
          initDataInputPanel();
        });

      fetch('univariate-input-panel.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('univariateInputPanelContainer').innerHTML = html;
        });
    });
  </script>
</body>
</html>
