<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Univariate Configuration</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#1a0a2e;color:#e5e7eb;font-family:Segoe UI,Arial,sans-serif;font-size:13px;}
    .wrap{padding:10px;}
    .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #4a1d6d;}
    .title{font-weight:800;font-size:15px;display:flex;gap:8px;align-items:center;color:#f97316;}
    .panel{border:1px solid #4a1d6d;background:#2d1344;border-radius:10px;padding:10px;margin-bottom:10px;}
    .panel-title{font-size:11px;font-weight:700;color:#c4b5fd;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
    label{font-size:12px;color:#c4b5fd;display:block;margin-bottom:4px;}
    select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #6b21a8;background:#1e0d3b;color:#e5e7eb;font-size:13px;cursor:pointer;}
    select:focus{outline:none;border-color:#f97316;}
    .meta{font-size:11px;color:#a78bfa;margin-bottom:6px;}
    /* Trim */
    .trim-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .trim-label{font-size:12px;color:#c4b5fd;width:80px;flex-shrink:0;}
    .trim-slider{flex:1;accent-color:#f97316;}
    .trim-val{font-size:12px;color:#f97316;font-weight:700;width:40px;text-align:right;}
    /* Transform */
    .transform-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .transform-option{position:relative;}
    .transform-option input[type="radio"]{position:absolute;opacity:0;cursor:pointer;width:100%;height:100%;}
    .transform-label{display:block;padding:8px 10px;border:1.5px solid #6b21a8;border-radius:8px;background:#1e0d3b;color:#c4b5fd;font-size:12px;font-weight:600;text-align:center;cursor:pointer;transition:all 0.15s;}
    .transform-option input[type="radio"]:checked + .transform-label{border-color:#f97316;background:#7c2d12;color:#fff;box-shadow:0 0 0 2px rgba(249,115,22,0.3);}
    .transform-label:hover{border-color:#f97316;background:#431407;}
    /* Buttons */
    .actions{display:flex;gap:8px;margin-top:10px;}
    .btn{padding:10px 14px;border-radius:8px;border:1px solid #6b21a8;background:#4c1d95;color:#e5e7eb;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;}
    .btn:hover{background:#5b21b6;}
    .btn.primary{background:linear-gradient(135deg,#f97316,#ea580c);border-color:#ea580c;font-weight:800;}
    .btn.primary:hover{background:linear-gradient(135deg,#fb923c,#f97316);}
    .btn.cancel{background:transparent;border-color:#4b5563;color:#9ca3af;}
    .btn.cancel:hover{border-color:#9ca3af;color:#e5e7eb;}
    .col-preview{margin-top:6px;padding:6px 10px;background:#1e0d3b;border-radius:6px;font-size:11px;color:#a78bfa;}
    .spinner{text-align:center;padding:20px;color:#a78bfa;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="title"><i class="fa-solid fa-chart-simple"></i> Univariate Configuration</div>
    </div>

    <div id="loadingSpinner" class="spinner">
      <i class="fa-solid fa-spinner fa-spin"></i> Loading data…
    </div>

    <div id="mainContent" style="display:none;">

      <!-- Range meta -->
      <div class="panel">
        <div class="meta">Range: <strong id="rangeAddr">—</strong></div>
        <div class="meta">Rows: <strong id="rowCount">0</strong> &nbsp;|&nbsp; Columns: <strong id="colCount">0</strong></div>
      </div>

      <!-- Column selection -->
      <div class="panel">
        <div class="panel-title"><i class="fa-solid fa-table-columns"></i> Column to Analyse</div>
        <label for="columnSelect">Select variable</label>
        <select id="columnSelect" onchange="onColumnChange()">
          <option value="">— pick a column —</option>
        </select>
        <div id="colPreview" class="col-preview" style="display:none;"></div>
      </div>

      <!-- Trim -->
      <div class="panel">
        <div class="panel-title"><i class="fa-solid fa-scissors"></i> Trim</div>
        <div class="trim-row">
          <span class="trim-label">Left trim</span>
          <input type="range" id="trimMin" class="trim-slider" min="0" max="49" value="0" step="1" oninput="onTrimChange()"/>
          <span class="trim-val" id="trimMinVal">0%</span>
        </div>
        <div class="trim-row">
          <span class="trim-label">Right trim</span>
          <input type="range" id="trimMax" class="trim-slider" min="51" max="100" value="100" step="1" oninput="onTrimChange()"/>
          <span class="trim-val" id="trimMaxVal">100%</span>
        </div>
      </div>

      <!-- Transform -->
      <div class="panel">
        <div class="panel-title"><i class="fa-solid fa-wave-square"></i> Transform</div>
        <div class="transform-grid">
          <div class="transform-option">
            <input type="radio" name="transform" id="t_none" value="none" checked />
            <label for="t_none" class="transform-label">None</label>
          </div>
          <div class="transform-option">
            <input type="radio" name="transform" id="t_ln" value="ln" />
            <label for="t_ln" class="transform-label">ln(x)</label>
          </div>
          <div class="transform-option">
            <input type="radio" name="transform" id="t_log10" value="log10" />
            <label for="t_log10" class="transform-label">log₁₀(x)</label>
          </div>
          <div class="transform-option">
            <input type="radio" name="transform" id="t_sqrt" value="sqrt" />
            <label for="t_sqrt" class="transform-label">√x</label>
          </div>
          <div class="transform-option">
            <input type="radio" name="transform" id="t_sq" value="square" />
            <label for="t_sq" class="transform-label">x²</label>
          </div>
          <div class="transform-option">
            <input type="radio" name="transform" id="t_rec" value="reciprocal" />
            <label for="t_rec" class="transform-label">1/x</label>
          </div>
          <div class="transform-option">
            <input type="radio" name="transform" id="t_z" value="z" />
            <label for="t_z" class="transform-label">z-score</label>
          </div>
          <div class="transform-option">
            <input type="radio" name="transform" id="t_mm" value="minmax" />
            <label for="t_mm" class="transform-label">Min-Max</label>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn cancel" onclick="cancel()"><i class="fa-solid fa-times"></i> Cancel</button>
        <button class="btn primary" id="runBtn" onclick="runAnalysis()" disabled>
          <i class="fa-solid fa-play"></i> Run Full Analysis
        </button>
      </div>

    </div><!-- /mainContent -->
  </div>

  <script>
    let STATE = { headers: [], rows: [], address: '', savedSpec: null };

    // ── Office init ──────────────────────────────────────────────────────────
    Office.onReady(() => {
      Office.context.ui.addHandlerAsync(
        Office.EventType.DialogParentMessageReceived,
        onMessageFromParent
      );
      send({ action: 'ready' });
    });

    function onMessageFromParent(arg) {
      try {
        const msg = JSON.parse(arg.message);
        if (msg.type === 'UNIVARIATE_DATA') applyPayload(msg.payload);
      } catch (_e) {}
    }

    function applyPayload(p) {
      STATE.headers = p.headers || [];
      STATE.rows    = p.rows    || [];
      STATE.address = p.address || '';
      STATE.savedSpec = p.savedSpec || null;

      document.getElementById('rangeAddr').textContent = STATE.address || 'Selection';
      document.getElementById('rowCount').textContent  = STATE.rows.length;
      document.getElementById('colCount').textContent  = STATE.headers.length;

      // Populate column dropdown
      const sel = document.getElementById('columnSelect');
      sel.innerHTML = '<option value="">— pick a column —</option>';
      STATE.headers.forEach((h, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = h || `Column ${i + 1}`;
        sel.appendChild(opt);
      });

      // Restore saved spec
      if (STATE.savedSpec) {
        sel.value = String(STATE.savedSpec.columnIndex ?? '');
        document.getElementById('trimMin').value = STATE.savedSpec.trimMin ?? 0;
        document.getElementById('trimMax').value = STATE.savedSpec.trimMax ?? 100;
        const savedTransform = STATE.savedSpec.transform || 'none';
        const radio = document.querySelector(`input[name="transform"][value="${savedTransform}"]`);
        if (radio) radio.checked = true;
        onTrimChange();
        onColumnChange();
      }

      document.getElementById('loadingSpinner').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }

    // ── Column change ────────────────────────────────────────────────────────
    function onColumnChange() {
      const sel   = document.getElementById('columnSelect');
      const idx   = parseInt(sel.value);
      const runBtn = document.getElementById('runBtn');
      const preview = document.getElementById('colPreview');

      if (isNaN(idx)) {
        runBtn.disabled = true;
        preview.style.display = 'none';
        return;
      }

      const values = STATE.rows
        .map(row => row[idx])
        .filter(v => v !== '' && v !== null && v !== undefined && !isNaN(parseFloat(v)))
        .map(v => parseFloat(v));

      if (!values.length) {
        runBtn.disabled = true;
        preview.style.display = 'none';
        return;
      }

      runBtn.disabled = false;
      const mn = Math.min(...values), mx = Math.max(...values);
      const mean = values.reduce((a, b) => a + b, 0) / values.length;
      preview.style.display = 'block';
      preview.innerHTML =
        `<strong>${values.length}</strong> numeric values &nbsp;|&nbsp; ` +
        `Mean <strong>${mean.toFixed(2)}</strong> &nbsp;|&nbsp; ` +
        `Range <strong>${mn.toFixed(2)}–${mx.toFixed(2)}</strong>`;
    }

    // ── Trim change ──────────────────────────────────────────────────────────
    function onTrimChange() {
      const minV = document.getElementById('trimMin').value;
      const maxV = document.getElementById('trimMax').value;
      document.getElementById('trimMinVal').textContent = `${minV}%`;
      document.getElementById('trimMaxVal').textContent = `${maxV}%`;
      // Enforce min < max
      if (parseInt(minV) >= parseInt(maxV)) {
        document.getElementById('trimMax').value = parseInt(minV) + 1;
        document.getElementById('trimMaxVal').textContent = `${parseInt(minV) + 1}%`;
      }
    }

    // ── Run ──────────────────────────────────────────────────────────────────
    function runAnalysis() {
      const sel = document.getElementById('columnSelect');
      const idx = parseInt(sel.value);
      if (isNaN(idx)) return;

      const transform = document.querySelector('input[name="transform"]:checked')?.value || 'none';
      const trimMin   = parseInt(document.getElementById('trimMin').value);
      const trimMax   = parseInt(document.getElementById('trimMax').value);
      const colName   = STATE.headers[idx] || `Column ${idx + 1}`;

      // Extract numeric column data
      let data = STATE.rows
        .map(row => row[idx])
        .filter(v => v !== '' && v !== null && v !== undefined && !isNaN(parseFloat(v)))
        .map(v => parseFloat(v));

      if (!data.length) return;

      // Apply trim
      if (trimMin > 0 || trimMax < 100) {
        const sorted = [...data].sort((a, b) => a - b);
        const minVal = sorted[Math.floor((sorted.length - 1) * trimMin / 100)];
        const maxVal = sorted[Math.floor((sorted.length - 1) * trimMax / 100)];
        data = data.filter(v => v >= minVal && v <= maxVal);
      }

      // Apply transform
      data = applyTransform(data, transform);

      // Compute statistics
      const results = calculateStatistics(data, STATE.address, colName, transform, trimMin, trimMax);

      // Send computed results + spec back to taskpane
      send({
        action: 'univariateResults',
        spec: { columnIndex: idx, columnName: colName, trimMin, trimMax, transform },
        data: results
      });
    }

    // ── Transform ─────────────────────────────────────────────────────────────
    function applyTransform(data, transform) {
      switch (transform) {
        case 'ln':         return data.map(v => Math.log(v));
        case 'log10':      return data.map(v => Math.log10(v));
        case 'sqrt':       return data.map(v => Math.sqrt(v));
        case 'square':     return data.map(v => v * v);
        case 'reciprocal': return data.map(v => 1 / v);
        case 'z': {
          const m  = data.reduce((a, b) => a + b, 0) / data.length;
          const sd = Math.sqrt(data.reduce((acc, v) => acc + (v - m) ** 2, 0) / data.length);
          return data.map(v => (v - m) / sd);
        }
        case 'minmax': {
          const mn = Math.min(...data), mx = Math.max(...data);
          return data.map(v => (v - mn) / (mx - mn));
        }
        default: return data;
      }
    }

    // ── Statistics ────────────────────────────────────────────────────────────
    function calculateStatistics(data, address, columnName, transform, trimMin, trimMax) {
      const n      = data.length;
      const sorted = [...data].sort((a, b) => a - b);
      const sum    = data.reduce((a, b) => a + b, 0);
      const mean   = sum / n;
      const variance = data.reduce((acc, v) => acc + (v - mean) ** 2, 0) / (n - 1);
      const stdDev   = Math.sqrt(variance);
      const min    = sorted[0];
      const max    = sorted[n - 1];
      const q1     = quantile(sorted, 0.25);
      const median = quantile(sorted, 0.5);
      const q3     = quantile(sorted, 0.75);
      const skewness = calcSkewness(data, mean, stdDev);
      const kurtosis = calcKurtosis(data, mean, stdDev);
      return {
        dataSource: address,
        column: columnName,
        transform,
        trim: { min: trimMin, max: trimMax },
        n,
        values: data,
        rawData: data,
        descriptive: { mean, median, stdDev, variance, min, max, range: max - min, q1, q3, iqr: q3 - q1, skewness, kurtosis }
      };
    }

    function quantile(sorted, q) {
      const pos  = (sorted.length - 1) * q;
      const base = Math.floor(pos);
      const rest = pos - base;
      return sorted[base + 1] !== undefined
        ? sorted[base] + rest * (sorted[base + 1] - sorted[base])
        : sorted[base];
    }

    function calcSkewness(data, mean, sd) {
      const n  = data.length;
      const m3 = data.reduce((acc, v) => acc + (v - mean) ** 3, 0) / n;
      return m3 / sd ** 3;
    }

    function calcKurtosis(data, mean, sd) {
      const n  = data.length;
      const m4 = data.reduce((acc, v) => acc + (v - mean) ** 4, 0) / n;
      return (m4 / sd ** 4) - 3;
    }

    // ── Cancel ───────────────────────────────────────────────────────────────
    function cancel() { send({ action: 'close' }); }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function send(msg) {
      Office.context.ui.messageParent(JSON.stringify(msg));
    }
  </script>
</body>
</html>
